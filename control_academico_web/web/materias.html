<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion de materias y periodos</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="barra-superior">
    <div class="marca">Control Academico</div>
    <nav class="navegacion-principal">
      <a href="/">Inicio</a>
      <a href="/estudiantes">Estudiantes</a>
      <a href="/materias">Materias y periodos</a>
      <a href="/matriculas">Matriculas</a>
      <a href="/notas">Notas</a>
      <a href="/asistencia">Asistencia</a>
      <a href="/reportes">Reportes</a>
    </nav>
    <div class="sesion-superior">
      <span id="usuario-sesion"></span>
      <button type="button" id="btn-cerrar-sesion" class="btn-salida">Cerrar sesion</button>
    </div>
  </header>

  <main class="contenedor">
    <h1>Gestion de materias y periodos</h1>

    <section class="panel">
      <h2>Materias</h2>
      <form id="formulario-materia">
        <input type="hidden" id="codigo-materia-editar">

        <label for="nombre-materia">Nombre de materia</label>
        <input type="text" id="nombre-materia" name="nombre_materia">

        <label for="docente">Docente</label>
        <input type="text" id="docente" name="docente">

        <label for="ciclo">Ciclo</label>
        <input type="number" id="ciclo" name="ciclo" min="1">

        <label for="estado-materia">Estado</label>
        <select id="estado-materia" name="estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>

        <div class="acciones">
          <button type="button" id="btn-guardar-materia">Guardar materia</button>
          <button type="button" id="btn-actualizar-materia">Actualizar materia</button>
          <button type="button" id="btn-listar-materias">Listar materias</button>
        </div>
      </form>

      <div class="grupo-consulta">
        <label for="buscar-materia">Codigo de materia</label>
        <input type="text" id="buscar-materia" placeholder="Ej: MAT001">
        <button type="button" id="btn-buscar-materia">Buscar materia</button>
      </div>

      <div class="tabla-contenedor">
        <table>
          <thead>
            <tr>
              <th>Codigo</th>
              <th>Nombre</th>
              <th>Docente</th>
              <th>Ciclo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-materias"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <h2>Periodos</h2>
      <form id="formulario-periodo">
        <label for="codigo-periodo">Codigo de periodo</label>
        <input type="text" id="codigo-periodo" name="codigo_periodo" placeholder="2026-I">

        <label for="anio-periodo">Anio</label>
        <input type="number" id="anio-periodo" name="anio" min="2000">

        <label for="nombre-periodo">Nombre</label>
        <input type="text" id="nombre-periodo" name="nombre">

        <label for="estado-periodo">Estado</label>
        <select id="estado-periodo" name="estado">
          <option value="activo">Activo</option>
          <option value="cerrado">Cerrado</option>
        </select>

        <div class="acciones">
          <button type="button" id="btn-guardar-periodo">Guardar periodo</button>
          <button type="button" id="btn-listar-periodos">Listar periodos</button>
          <button type="button" id="btn-activar-periodo">Cambiar periodo activo</button>
        </div>
      </form>

      <div class="grupo-consulta">
        <label for="buscar-periodo">Codigo de periodo</label>
        <input type="text" id="buscar-periodo" placeholder="Ej: 2026-I">
        <button type="button" id="btn-buscar-periodo">Buscar periodo</button>
      </div>

      <div class="tabla-contenedor">
        <table>
          <thead>
            <tr>
              <th>Codigo</th>
              <th>Anio</th>
              <th>Nombre</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-periodos"></tbody>
        </table>
      </div>
    </section>

    <section id="mensaje-materias" class="mensaje"></section>
  </main>

  <script src="/static/app.js"></script>
  <script src="/static/materias.js"></script>
</body>
</html>
