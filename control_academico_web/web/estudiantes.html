<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de estudiantes</title>
</head>
<body>
  <main>
    <h1>Gestión de estudiantes</h1>

    <section>
      <h2>Registrar estudiante</h2>

      <form id="formulario-estudiante">
        <label for="nombres">Nombres</label>
        <input type="text" id="nombres" name="nombres">

        <label for="apellidos">Apellidos</label>
        <input type="text" id="apellidos" name="apellidos">

        <label for="dni">DNI</label>
        <input type="text" id="dni" name="dni" maxlength="8">

        <label for="correo">Correo</label>
        <input type="email" id="correo" name="correo">

        <label for="estado">Estado</label>
        <select id="estado" name="estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>

        <button type="submit" id="btn-guardar-estudiante">Guardar estudiante</button>
      </form>
    </section>

    <section>
      <h2>Buscar estudiante</h2>

      <input type="text" id="buscar-estudiante" placeholder="Código o DNI">
      <button type="button" id="btn-buscar-estudiante">Buscar</button>
    </section>

    <section id="mensaje-estudiantes"></section>

    <section>
      <h2>Lista de estudiantes</h2>

      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Nombres</th>
            <th>Apellidos</th>
            <th>DNI</th>
            <th>Correo</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-estudiantes">
        </tbody>
      </table>
    </section>
  </main>

  <script src="../static/estudiantes.js"></script>
</body>
</html>
