<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion de estudiantes</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="barra-superior">
    <div class="marca">Control Academico</div>
    <nav class="navegacion-principal">
      <a href="/">Inicio</a>
      <a href="/estudiantes">Estudiantes</a>
      <a href="/materias">Materias y periodos</a>
      <a href="/matriculas">Matriculas</a>
      <a href="/notas">Notas</a>
      <a href="/asistencia">Asistencia</a>
      <a href="/reportes">Reportes</a>
      <a href="/usuarios" class="solo-admin">Usuarios</a>
    </nav>
    <div class="sesion-superior">
      <span id="usuario-sesion"></span>
      <button type="button" id="btn-cerrar-sesion" class="btn-salida">Cerrar sesion</button>
    </div>
  </header>

  <main class="contenedor">
    <h1>Gestion de estudiantes</h1>

    <section class="panel">
      <h2>Datos del estudiante</h2>
      <form id="formulario-estudiante">
        <input type="hidden" id="codigo-estudiante-editar">

        <label for="nombres">Nombres</label>
        <input type="text" id="nombres" name="nombres">

        <label for="apellidos">Apellidos</label>
        <input type="text" id="apellidos" name="apellidos">

        <label for="dni">DNI</label>
        <input type="text" id="dni" name="dni" maxlength="8">

        <label for="correo">Correo</label>
        <input type="email" id="correo" name="correo">

        <label for="estado">Estado</label>
        <select id="estado" name="estado">
          <option value="activo">Activo</option>
          <option value="inactivo">Inactivo</option>
        </select>

        <div class="acciones">
          <button type="button" id="btn-guardar-estudiante">Guardar estudiante</button>
          <button type="button" id="btn-actualizar-estudiante">Actualizar estudiante</button>
          <button type="button" id="btn-limpiar-estudiante" class="secundario">Limpiar</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>Consultas</h2>
      <label for="buscar-estudiante">Codigo o DNI</label>
      <input type="text" id="buscar-estudiante" placeholder="Ej: EST001 o 12345678">
      <div class="acciones">
        <button type="button" id="btn-buscar-estudiante">Buscar estudiante</button>
        <button type="button" id="btn-listar-estudiantes">Listar estudiantes</button>
      </div>
    </section>

    <section id="mensaje-estudiantes" class="mensaje"></section>

    <section class="panel">
      <h2>Lista de estudiantes</h2>
      <div class="tabla-contenedor">
        <table>
          <thead>
            <tr>
              <th>Codigo</th>
              <th>Nombres</th>
              <th>Apellidos</th>
              <th>DNI</th>
              <th>Correo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-estudiantes"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
  <script src="/static/estudiantes.js"></script>
</body>
</html>
