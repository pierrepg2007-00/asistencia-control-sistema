<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes academicos</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="barra-superior">
    <div class="marca">Control Academico</div>
    <nav class="navegacion-principal">
      <a href="/">Inicio</a>
      <a href="/estudiantes">Estudiantes</a>
      <a href="/materias">Materias y periodos</a>
      <a href="/matriculas">Matriculas</a>
      <a href="/notas">Notas</a>
      <a href="/asistencia">Asistencia</a>
      <a href="/reportes">Reportes</a>
      <a href="/usuarios" class="solo-admin">Usuarios</a>
    </nav>
    <div class="sesion-superior">
      <span id="usuario-sesion"></span>
      <button type="button" id="btn-cerrar-sesion" class="btn-salida">Cerrar sesion</button>
    </div>
  </header>

  <main class="contenedor">
    <h1>Reportes academicos</h1>

    <section class="panel">
      <h2>Reportes academicos</h2>
      <div class="grid-formulario">
        <div>
          <label for="rep-materia">Codigo de materia</label>
          <input type="text" id="rep-materia" placeholder="Ej: MAT001">
        </div>
        <div>
          <label for="rep-periodo">Codigo de periodo</label>
          <input type="text" id="rep-periodo" placeholder="Ej: 2026-I">
        </div>
      </div>
      <div class="acciones">
        <button type="button" id="btn-reporte-estudiantes">Estudiantes por materia</button>
        <button type="button" id="btn-reporte-notas">Notas por materia</button>
        <button type="button" id="btn-reporte-asistencia">Asistencia por materia</button>
      </div>
    </section>

    <section class="panel">
      <h2>Estudiantes en riesgo</h2>
      <button type="button" id="btn-reporte-riesgo">Estudiantes en riesgo</button>
    </section>

    <section class="panel">
      <h2>Exportar reporte</h2>
      <label for="nombre-reporte">Nombre del reporte</label>
      <input type="text" id="nombre-reporte" placeholder="Ej: reporte_integracion">
      <button type="button" id="btn-exportar">Exportar reporte TXT</button>
    </section>

    <section id="zona-mensajes-reportes" class="mensaje"></section>

    <section class="panel">
      <h2>Resultados</h2>
      <div id="zona-resultados-reporte" class="resultado">
        <p>Seleccione un reporte para ver los resultados.</p>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
  <script src="/static/reportes.js"></script>
</body>
</html>
